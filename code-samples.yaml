overlay: 1.0.0
info:
  title: CodeSamples overlay for python target
  version: 0.0.0
actions:
  - target: $["paths"]["/agent/run/{instance_id}"]["post"]
    update:
      "x-codeSamples":
        - "lang": "python"
          "label": "Python (SDK)"
          "source": "import os\nfrom skylight_sdk import Skylight\n\n\nwith Skylight(\n    apikey=os.getenv(\"SKYLIGHT_APIKEY\", \"\"),\n) as skylight:\n\n    res = skylight.agent.run(instance_id=\"<id>\", query=\"Search for something on the VM\")\n\n    # Handle response\n    print(res)"
  - target: $["paths"]["/agent/status/{agent_id}"]["get"]
    update:
      "x-codeSamples":
        - "lang": "python"
          "label": "Python (SDK)"
          "source": "import os\nfrom skylight_sdk import Skylight\n\n\nwith Skylight(\n    apikey=os.getenv(\"SKYLIGHT_APIKEY\", \"\"),\n) as skylight:\n\n    res = skylight.agent.status(agent_id=\"<id>\")\n\n    # Handle response\n    print(res)"
